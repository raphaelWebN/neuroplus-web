<!DOCTYPE html>
<html lang="zh-TW">
<head>
<title>畫面 1 — 產品登錄</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Roboto:wght@100;300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:rgba(31,188,179,0.1);display:flex;align-items:flex-start;justify-content:center;min-height:100vh;font-family:'Noto Sans TC',sans-serif}
.wrap{width:375px;min-height:100vh;background:rgba(31,188,179,0.1);position:relative;padding:16px 16px 100px}
.lt{color:#1fbcb3;font-size:13px;font-weight:600;margin-bottom:8px}
.h1d{color:#1e1e1e;font-size:26px;font-weight:600;line-height:1.22}
.h1dg{color:#13241f;font-size:26px;font-weight:600;line-height:1.22}
.h2t{color:#1fbcb3;font-size:16px;font-weight:600}
.sh{margin-bottom:16px}
.cd{background:white;border-radius:12px;padding:24px;width:100%;margin-bottom:16px}
.cds{background:white;border-radius:12px;padding:12px 16px;width:100%;display:flex;align-items:center;margin-bottom:8px}
.ip{background:white;border:1px solid #ccc;border-radius:999px;height:48px;width:100%;display:flex;align-items:center;padding:0 16px;font-size:16px;color:rgba(102,102,102,.7)}
.ips{background:white;border:1px solid #ccc;border-radius:999px;height:28px;display:inline-flex;align-items:center;padding:0 12px;font-size:14px;color:rgba(102,102,102,.7);white-space:nowrap}
.orsep{display:flex;align-items:center;gap:12px;justify-content:center;padding:4px 0}
.orl{background:#d9d9d9;height:1px;width:32px}
.bg{background:#74bc1f;color:white;border:none;border-radius:999px;width:100%;padding:10px 13px;font-size:17px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}
.bol{background:transparent;color:#74bc1f;border:1.5px solid #74bc1f;border-radius:999px;flex:1;padding:9px 13px;font-size:17px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-align:center}
.bol.sel{background:#74bc1f;color:white}
.boff{background:#eee;color:#22302f;border:1.5px solid #eee;border-radius:999px;width:100%;padding:10px 13px;font-size:17px;font-family:'Noto Sans TC',sans-serif;cursor:default;text-align:center;opacity:.4}
.br{display:flex;gap:8px;width:100%}
.sp{padding:16px 0 17px}
.sp+.sp{border-top:1px solid #eee}
.dayg{font-family:'Roboto',sans-serif;font-weight:500;font-size:32px;color:#74bc1f;flex:1}
.dayl{font-family:'Roboto',sans-serif;font-weight:300;font-size:32px;color:#74bc1f;flex:1}
.dayx{font-family:'Roboto',sans-serif;font-weight:300;font-size:32px;color:rgba(102,102,102,.7);flex:1}
.by{background:#74bc1f;color:white;font-size:14px;height:28px;padding:0 12px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.bn{background:white;color:rgba(102,102,102,.7);font-size:14px;height:28px;padding:0 12px;border-radius:999px;border:1px solid #ccc;display:inline-flex;align-items:center;white-space:nowrap}
.ta{background:white;border:1px solid #d9e5df;border-radius:8px;height:72px;width:100%;padding:13px;font-size:16px;color:#b3b3b3;font-family:'Noto Sans TC',sans-serif;resize:none}
.ta.f{color:#1e1e1e}
.bot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:375px;padding:0 16px 16px;padding-top:32px;background:linear-gradient(to bottom,rgba(233,248,247,0) 0%,#e9f8f7 42%);display:flex;flex-direction:column;gap:8px}
.rg{background:linear-gradient(-62.5deg,#fff 0%,#afdcd9 96%);border:1px solid white;border-radius:8px;padding:17px;box-shadow:0 8px 14px #b1e0dd;margin-bottom:8px}
.sts{display:flex;gap:8px;height:68px}
.stb{flex:1;background:white;border:1px solid #d9e5df;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.mc{background:white;border:1px solid #d9e5df;border-radius:8px;padding:14px;margin-bottom:8px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mbg{background:#e0f3ee;color:#064b46;font-size:12px;font-weight:600;padding:4px 8px;border-radius:999px}
.pr{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.pd{font-size:12px;color:#667873;width:36px;flex-shrink:0}
.pb{flex:1;height:7px;background:#eee;border-radius:999px;overflow:hidden}
.pf{height:100%;background:#1fbcb3;border-radius:999px}
.hi{color:#1fbcb3}
.sgc{background:#301675;border-radius:8px;padding:13px;color:white;margin-bottom:8px}
.rc{background:#f4fbf8;border:1px solid #301675;border-radius:8px;padding:17px;margin-bottom:8px}
.rtg{background:#301675;color:white;font-size:12px;font-weight:600;padding:5px 9px;border-radius:999px;display:inline-block;margin-bottom:8px}
.rbl{width:16px;height:16px;background:#301675;border-radius:999px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.oc2{display:flex;gap:12px;margin-bottom:16px}
.occ{flex:1;background:white;border:1px solid #ccc;border-radius:8px;padding:11px}
</style>
</head>
<body>
<div class="wrap">

<div class="sh"><div class="lt">7 天使用任務</div><div class="h1d">開始前先登錄產品資料吧！</div></div>
<div class="cd">
  <div class="sp" style="padding-top:0;border-bottom:1px solid #eee">
    <div style="color:#1e1e1e;font-size:15px;font-weight:600;margin-bottom:8px">請輸入平衡衣序號或掃描QR Code</div>
    <div class="ip" style="margin-bottom:8px">輸入序號</div>
    <div class="orsep" style="margin-bottom:8px"><div class="orl"></div><span style="color:rgba(102,102,102,.7);font-size:12px">或</span><div class="orl"></div></div>
    <button class="bg"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="white" stroke-width="1.5"/><rect x="11" y="1" width="6" height="6" rx="1" stroke="white" stroke-width="1.5"/><rect x="1" y="11" width="6" height="6" rx="1" stroke="white" stroke-width="1.5"/><line x1="11" y1="14" x2="17" y2="14" stroke="white" stroke-width="1.5" stroke-linecap="round"/><line x1="14" y1="11" x2="14" y2="17" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>掃描QR Code</button>
  </div>
  <div class="sp" style="border-top:none;padding-bottom:0">
    <div style="color:#1e1e1e;font-size:15px;font-weight:600;margin-bottom:8px">請選擇您要紀錄睡眠狀況的開始時間</div>
    <div class="ip" style="justify-content:space-between"><span>2026/07/08</span><svg width="20" height="22" viewBox="0 0 20 22" fill="none"><path d="M18 2H16V1C16 .448 15.552 0 15 0S14 .448 14 1V2H6V1C6 .448 5.552 0 5 0S4 .448 4 1V2H2C.9 2 0 2.9 0 4V20C0 21.1.9 22 2 22H18C19.1 22 20 21.1 20 20V4C20 2.9 19.1 2 18 2ZM18 20H2V8H18V20ZM18 6H2V4H4V5C4 5.552 4.448 6 5 6S6 5.552 6 5V4H14V5C14 5.552 14.448 6 15 6S16 5.552 16 5V4H18V6Z" fill="#74BC1F"/></svg></div>
  </div>
</div>
<div class="bot"><div class="boff">開始紀錄任務</div></div>
</div>
</body>
</html>
