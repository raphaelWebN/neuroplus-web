<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectOS - 登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");
    * { font-family: "Inter", sans-serif; }
    .fade-in { animation: fadeIn .35s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, .15); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div class="min-h-screen grid grid-cols-1 lg:grid-cols-2">
    <section class="hidden lg:flex bg-gradient-to-br from-blue-600 via-blue-500 to-violet-600 text-white p-10 xl:p-14">
      <div class="max-w-md my-auto">
        <p class="text-xs font-semibold tracking-wider uppercase opacity-80">ProjectOS</p>
        <h1 class="text-4xl font-extrabold leading-tight mt-3">Decision to Execution<br>in one flow.</h1>
        <p class="text-sm opacity-90 mt-4 leading-relaxed">整合專案建立、Dashboard 與 Task 追蹤，讓團隊把決策快速轉成可執行任務。</p>

        <div class="grid grid-cols-3 gap-3 mt-8 text-xs">
          <div class="bg-white/15 border border-white/20 rounded-xl p-3">
            <p class="text-2xl font-bold">+38%</p>
            <p class="opacity-80 mt-1">交付效率</p>
          </div>
          <div class="bg-white/15 border border-white/20 rounded-xl p-3">
            <p class="text-2xl font-bold">24h</p>
            <p class="opacity-80 mt-1">回應速度</p>
          </div>
          <div class="bg-white/15 border border-white/20 rounded-xl p-3">
            <p class="text-2xl font-bold">92%</p>
            <p class="opacity-80 mt-1">任務可視化</p>
          </div>
        </div>
      </div>
    </section>

    <section class="flex items-center justify-center p-5 md:p-8">
      <div class="w-full max-w-md fade-in">
        <a href="dashboard.html" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-blue-600 transition mb-5">← 返回系統</a>
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-7 md:p-8">
          <p class="text-xs font-semibold text-violet-600 bg-violet-50 border border-violet-200 px-2.5 py-1 rounded-full inline-flex">版本 B</p>
          <h2 class="text-2xl font-extrabold text-slate-900 mt-3">登入你的帳號</h2>
          <p class="text-sm text-slate-500 mt-1.5">建議使用公司帳號登入，便於團隊權限控管。</p>

          <form class="space-y-4 mt-6">
            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1.5">Email</label>
              <input type="email" placeholder="alice@company.com" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:border-blue-400 transition">
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-500 mb-1.5">Password</label>
              <input type="password" placeholder="請輸入密碼" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:border-blue-400 transition">
            </div>

            <div class="flex items-center justify-between text-sm">
              <label class="flex items-center gap-2 text-slate-600">
                <input type="checkbox" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                記住我
              </label>
              <a href="#" class="text-blue-600 hover:text-blue-700">重設密碼</a>
            </div>

            <button type="button" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-bold text-sm transition">登入</button>
            <button type="button" class="w-full border border-slate-200 hover:bg-slate-50 text-slate-700 py-2.5 rounded-xl font-medium text-sm transition">Google Workspace 登入</button>
          </form>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
