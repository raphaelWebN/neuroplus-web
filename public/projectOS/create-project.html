<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProjectOS — 建立新專案</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{50:'#f0f7ff',100:'#e0efff',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8'}}}}}</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *{font-family:'Inter',sans-serif;}
  .fade-in{animation:fadeIn .35s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .slide-up{animation:slideUp .4s ease;}
  @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  textarea:focus,input:focus,select:focus{outline:none;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
  .ai-btn{background:linear-gradient(135deg,#7c3aed,#4f46e5,#2563eb);transition:all .2s;}
  .ai-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,.35);}
  .typing-cursor::after{content:'|';animation:blink .7s infinite;color:#7c3aed;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .task-chip{animation:chipIn .2s ease;}
  @keyframes chipIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  .progress-bar{transition:width .5s ease;}
  .step-dot{transition:all .3s;}
  .ai-gradient-text{background:linear-gradient(135deg,#7c3aed,#2563eb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .section-card{border:1.5px solid transparent;transition:border-color .3s;}
  .section-card:hover{border-color:#e0e7ff;}
  .risk-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;}
  .gen-appear{animation:genAppear .5s ease forwards;}
  @keyframes genAppear{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .pulse-ring{animation:pulseRing 2s infinite;}
  @keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(124,58,237,.4)}70%{box-shadow:0 0 0 10px rgba(124,58,237,0)}100%{box-shadow:0 0 0 0 rgba(124,58,237,0)}}
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<div id="projectos-header"></div>
<script src="./shared-header.js"></script>

<div class="max-w-screen-xl mx-auto px-4 py-8">

  <!-- HEADER -->
  <div class="flex items-center gap-3 mb-8 mt-2">
    <div class="flex-1">
      <h1 class="text-2xl font-extrabold text-slate-900">建立新專案</h1>
      <p class="text-sm text-slate-500 mt-0.5">手動填寫專案資料、決策、KPI 與任務後建立</p>
    </div>
  </div>

  <!-- 手動建立 -->
  <div id="manual-mode" class="fade-in">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

        <!-- LEFT COL (2/3) -->
        <div class="lg:col-span-2 space-y-4">

          <!-- Basic Info -->
          <div class="section-card bg-white rounded-xl border border-slate-200 p-5">
            <div class="flex items-center gap-2 mb-4">
              <div class="w-7 h-7 bg-blue-100 rounded-lg flex items-center justify-center text-sm">📄</div>
              <h3 class="font-semibold text-slate-800">基本資訊</h3>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="col-span-2"><label class="block text-xs font-medium text-slate-500 mb-1.5">專案名稱 <span class="text-red-400">*</span></label><input id="m-proj-name" type="text" placeholder="輸入專案名稱..." class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400 transition font-medium"></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">負責人</label>
                <div class="flex gap-2">
                  <input id="m-owner" type="text" readonly placeholder="點擊選擇負責人" onclick="openAdminPicker('owner')" class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400 transition cursor-pointer bg-white" title="從員工名單選擇">
                  <button type="button" onclick="openAdminPicker('owner')" class="shrink-0 px-3 py-2 text-xs font-semibold text-blue-600 border border-blue-200 rounded-lg hover:bg-blue-50 transition">選擇</button>
                </div>
              </div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">參與人員</label>
                <div class="flex gap-2">
                  <input id="m-members" type="text" readonly placeholder="點擊選擇參與人員（可多選）" onclick="openAdminPicker('members')" class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400 transition cursor-pointer bg-white" title="從員工名單選擇">
                  <button type="button" onclick="openAdminPicker('members')" class="shrink-0 px-3 py-2 text-xs font-semibold text-blue-600 border border-blue-200 rounded-lg hover:bg-blue-50 transition">選擇</button>
                </div>
              </div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">開始日期</label><input id="m-start" type="date" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400 transition"></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">預計結束</label><input id="m-end" type="date" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400 transition"></div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">部門</label>
                <select id="m-dept" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-600 focus:border-blue-400 transition">
                  <option value="">選擇部門</option>
                  <option>業務發展處</option><option>總經理室</option><option>創新研發處</option><option>智慧醫療業務部</option><option>客服暨會員關係部</option>
                </select>
              </div>
              <div><label class="block text-xs font-medium text-slate-500 mb-1.5">ShareProject URL</label><input id="m-url" type="text" placeholder="https://chatgpt.com/share/..." class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:border-blue-400 transition"></div>
            </div>
          </div>

          <!-- Decision -->
          <div class="section-card bg-white rounded-xl border border-slate-200 p-5">
            <div class="flex items-center gap-2 mb-4">
              <div class="w-7 h-7 bg-purple-100 rounded-lg flex items-center justify-center text-sm">⚡</div>
              <h3 class="font-semibold text-slate-800">決策摘要</h3>
            </div>
            <textarea id="m-decision" rows="4" placeholder="描述此專案的核心決策、目標與背景..." class="w-full border border-slate-200 rounded-lg px-3 py-3 text-sm resize-none focus:border-blue-400 transition leading-relaxed"></textarea>
          </div>

          <!-- KPI -->
          <div class="section-card bg-white rounded-xl border border-slate-200 p-5">
            <div class="flex items-center gap-2 mb-4">
              <div class="w-7 h-7 bg-green-100 rounded-lg flex items-center justify-center text-sm">📊</div>
              <h3 class="font-semibold text-slate-800">KPI 指標</h3>
              <button onclick="addManualKPI()" class="ml-auto text-xs text-blue-600 hover:text-blue-800 font-medium">+ 新增</button>
            </div>
            <div id="m-kpi-list" class="space-y-2.5 mb-2"></div>
            <button onclick="addManualKPI()" class="w-full border border-dashed border-slate-300 text-slate-400 hover:border-blue-300 hover:text-blue-500 py-2 rounded-lg text-xs transition">+ 新增 KPI 指標</button>
          </div>

        </div>

        <!-- RIGHT COL (1/3) -->
        <div class="space-y-4">

          <!-- Tasks -->
          <div class="section-card bg-white rounded-xl border border-slate-200 p-5">
            <div class="flex items-center gap-2 mb-4">
              <div class="w-7 h-7 bg-amber-100 rounded-lg flex items-center justify-center text-sm">✅</div>
              <h3 class="font-semibold text-slate-800">任務清單</h3>
              <span class="text-xs text-slate-400 ml-auto" id="m-task-count">0 個任務</span>
            </div>
            <div id="m-task-list" class="space-y-2 mb-3"></div>
            <button onclick="openTaskModal()" class="w-full border border-dashed border-slate-300 text-slate-400 hover:border-blue-300 hover:text-blue-500 py-2.5 rounded-lg text-xs transition flex items-center justify-center gap-1.5">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              新增任務
            </button>
          </div>

          <!-- Submit -->
          <div class="bg-white rounded-xl border border-slate-200 p-5">
            <button onclick="submitManualProject()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-sm transition mb-2.5 flex items-center justify-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              建立專案
            </button>
           
          </div>

        </div>
      </div>
    </div>

  </div>

<!-- TASK MODAL -->
<div id="task-modal" class="fixed inset-0 z-50 hidden items-center justify-center " style="background:rgba(0,0,0,0.45)" onclick="if(event.target===this)closeTaskModal()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 p-6 fade-in max-h-[85vh] overflow-y-auto ">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-3 h-3 rounded-full bg-slate-300 flex-shrink-0"></div>
      <h3 class="font-bold text-slate-900 text-lg" id="modal-title-text">新增任務</h3>
      <button onclick="closeTaskModal()" class="ml-auto text-slate-400 hover:text-slate-600 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">任務標題 <span class="text-red-500">*</span></label>
        <input id="mt-title" type="text" placeholder="輸入任務標題..." class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-blue-400 transition">
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">任務描述</label>
        <textarea id="mt-desc" rows="3" placeholder="目標、範圍、注意事項..." class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm resize-none focus:border-blue-400 transition"></textarea>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">開始日期</label>
          <input id="mt-start" type="date" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-blue-400 transition">
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">結束日期</label>
          <input id="mt-end" type="date" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-blue-400 transition">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">負責人</label>
          <div class="flex gap-2">
            <input id="mt-assignee" type="text" readonly placeholder="點擊選擇負責人" onclick="openAdminPicker('taskAssignee')" class="flex-1 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-blue-400 transition cursor-pointer bg-white" title="從員工名單選擇">
            <button type="button" onclick="openAdminPicker('taskAssignee')" class="shrink-0 px-3 py-2 text-xs font-semibold text-blue-600 border border-blue-200 rounded-lg hover:bg-blue-50 transition">選擇</button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">狀態</label>
          <select id="mt-status" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-blue-400 transition">
            <option value="待辦">📋 待辦</option>
            <option value="進行中">🔵 進行中</option>
            <option value="完成">✅ 完成</option>
            <option value="延遲">⚠️ 延遲</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">前置任務（完成後才能開始）</label>
        <select id="mt-prereq" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:border-blue-400 transition">
          <option value="">無前置任務</option>
        </select>
      </div>
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="block text-sm font-semibold text-slate-700">任務附件</label>
          <label for="mt-file-input" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 px-2.5 py-1 rounded-lg font-medium transition cursor-pointer">+ 新增檔案</label>
        </div>
        <input id="mt-file-input" type="file" multiple class="hidden" onchange="handleTaskFileInput(this)">
        <div id="mt-file-list" class="space-y-2"></div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">執行計畫 P</label>
          <textarea id="mt-exe-plan" rows="3" placeholder="請輸入執行計畫（Plan）..." class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm resize-none focus:border-blue-400 transition"></textarea>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">執行狀況 D</label>
          <textarea id="mt-exe-cond" rows="3" placeholder="請輸入執行狀況（Do）..." class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm resize-none focus:border-blue-400 transition"></textarea>
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1.5">執行結果 C</label>
        <textarea id="mt-exe-result" rows="3" placeholder="請輸入執行結果（Check）..." class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm resize-none focus:border-blue-400 transition"></textarea>
      </div>
      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="block text-sm font-semibold text-slate-700">重要討論主題 URL</label>
          <button type="button" onclick="addTaskDiscussionRow()" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 px-2.5 py-1 rounded-lg font-medium transition">+ 新增討論 URL</button>
        </div>
        <div id="mt-discussion-list" class="space-y-2"></div>
      </div>
    </div>

    <div class="flex gap-3 mt-6">
      <button onclick="saveTaskModal()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-sm transition">儲存</button>
      <button id="mt-delete-btn" onclick="deleteTaskModal()" class="hidden border border-slate-200 text-slate-600 hover:bg-red-50 hover:text-red-600 hover:border-red-200 px-5 py-3 rounded-xl text-sm font-medium transition">刪除</button>
      <button onclick="closeTaskModal()" class="border border-slate-200 text-slate-600 hover:bg-slate-50 px-5 py-3 rounded-xl text-sm font-medium transition">取消</button>
    </div>
  </div>
</div>

<!-- ADMIN NAME PICKER MODAL -->
<div id="admin-picker-modal" class="fixed inset-0 z-[55] hidden items-center justify-center" style="background:rgba(0,0,0,0.45)" onclick="if(event.target===this)closeAdminPicker()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6 fade-in max-h-[90vh] flex flex-col" onclick="event.stopPropagation()">
    <div class="flex items-center gap-3 mb-4">
      <h3 class="font-bold text-slate-900 text-lg" id="admin-picker-title">選擇員工</h3>
      <button type="button" onclick="closeAdminPicker()" class="ml-auto text-slate-400 hover:text-slate-600 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <input id="admin-picker-search" type="text" placeholder="搜尋姓名…" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:border-blue-400 transition mb-3" oninput="renderAdminPickerList()">
    <p class="text-xs text-slate-400 mb-2" id="admin-picker-hint"></p>
    <div id="admin-picker-list" class="flex-1 min-h-[200px] max-h-[min(50vh,360px)] overflow-y-auto border border-slate-100 rounded-xl divide-y divide-slate-100"></div>
    <div class="flex gap-3 mt-5">
      <button type="button" onclick="applyAdminPicker()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-sm transition">確定</button>
      <button type="button" onclick="closeAdminPicker()" class="border border-slate-200 text-slate-600 hover:bg-slate-50 px-5 py-3 rounded-xl text-sm font-medium transition">取消</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-5 right-5 z-50 hidden">
  <div class="bg-slate-900 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 max-w-sm fade-in">
    <svg id="toast-icon" class="w-4 h-4 text-green-400 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
    <p id="toast-msg" class="text-sm"></p>
  </div>
</div>

<script>
// ─── BACKEND API (FR) ───
const API_BASE = "https://23700999.com:8081/PM";
const NEW_PROJECT_URL = API_BASE + "/api/fr/NewProject";

const GET_DEPARTMENT_URL = API_BASE + "/api/fr/getDepartmentCode";
const GET_ADMIN_NAME_LIST_URL = API_BASE + "/api/fr/getAdminNameList";
const TASK_STATE_LIST_URLS = [
  API_BASE + "/api/fr/getTaskStateCode",
  API_BASE + "/api/fr/getTaskState"
];

// 預設值：API 若失敗時仍可運作
let DEPARTMENT_CODE_MAP = {
  "業務發展處": "1",
  "總經理室": "2",
  "創新研發處": "3",
  "智慧醫療業務部": "4",
  "客服暨會員關係部": "5"
};

// 依照 UI 狀態文字做「猜測」對應 Code；會在取得 TaskStateList 後自動更新
let TASK_STATE_CODE_MAP = {
  "待辦": "1",
  "進行中": "2",
  "完成": "3",
  "延遲": "4"
};

let departmentListCache = null;
let taskStateListCache = null;
let adminNameListCache = null;
let adminPickerMode = "owner";
let adminPickerSelectedMembers = new Set();

function statusIconByCode(code) {
  switch (String(code)) {
    case "1":
      return "📋";
    case "2":
      return "🔵";
    case "3":
      return "✅";
    case "4":
      return "⚠️";
    default:
      return "•";
  }
}

function getBackendTokenAndAdmin() {
  const token = localStorage.getItem("backendToken") || sessionStorage.getItem("backendToken");
  const adminID = localStorage.getItem("adminID") || sessionStorage.getItem("adminID");
  if (!token || !adminID) {
    showToast("請先登入後台（右上角頭像需要有登入狀態）", "warn");
    return null;
  }
  return { token, adminID };
}

function postJson(url, body) {
  if (typeof window.projectOSPostJson === "function") {
    return window.projectOSPostJson(url, body);
  }
  return fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  }).then(function (res) {
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  });
}

function normalizeAdminDirectory(arr) {
  const seen = new Set();
  const out = [];
  (arr || []).forEach(function (item) {
    const name = String(
      item && typeof item === "object" ? item.Name || "" : item || "",
    ).trim();
    const adminID = String(
      item && typeof item === "object" ? item.AdminID || "" : "",
    ).trim();
    const email = String(
      item && typeof item === "object" ? item.Email || "" : "",
    ).trim();
    if (!name) return;
    const key = (name + "|" + adminID).toLowerCase();
    if (seen.has(key)) return;
    seen.add(key);
    out.push({ Name: name, AdminID: adminID, Email: email });
  });
  out.sort(function (a, b) {
    return String(a.Name || "").localeCompare(String(b.Name || ""), "zh-Hant");
  });
  return out;
}

function escAttr(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;");
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function fetchAdminNameList() {
  const session = getBackendTokenAndAdmin();
  if (!session) return Promise.reject(new Error("no session"));
  return postJson(GET_ADMIN_NAME_LIST_URL, { AdminID: session.adminID, Token: session.token }).then(function (r) {
    if (!r || String(r.Result).toUpperCase() !== "OK") throw new Error("bad result");
    const raw = r.adminNameList || r.AdminNameList || [];
    if (!Array.isArray(raw)) throw new Error("bad list");
    adminNameListCache = normalizeAdminDirectory(raw);
    return adminNameListCache;
  });
}

function openAdminPicker(mode) {
  adminPickerMode = mode;
  const session = getBackendTokenAndAdmin();
  if (!session) return;

  const titleEl = document.getElementById("admin-picker-title");
  const hintEl = document.getElementById("admin-picker-hint");
  const searchEl = document.getElementById("admin-picker-search");
  if (titleEl) {
    titleEl.textContent =
      mode === "owner" || mode === "taskAssignee" ? "選擇負責人" : "選擇參與人員";
  }
  if (hintEl) {
    hintEl.textContent =
      mode === "members" ? "可勾選多位，確定後以逗號分隔寫入欄位" : "請選擇一位負責人";
  }
  if (searchEl) searchEl.value = "";
  if (mode === "members") {
    adminPickerSelectedMembers = new Set();
    (document.getElementById("m-members") ? document.getElementById("m-members").value : "")
      .split(/[,，、\s]+/)
      .forEach(function (s) {
        const t = s.trim();
        if (t) adminPickerSelectedMembers.add(t);
      });
  }

  function showModal() {
    const modal = document.getElementById("admin-picker-modal");
    if (modal) {
      modal.classList.remove("hidden");
      modal.style.display = "flex";
    }
    renderAdminPickerList();
    setTimeout(function () {
      if (searchEl) searchEl.focus();
    }, 50);
  }

  if (adminNameListCache && adminNameListCache.length) {
    showModal();
    return;
  }

  fetchAdminNameList()
    .then(function () {
      showModal();
    })
    .catch(function () {
      showToast("無法取得員工名單", "warn");
    });
}

function closeAdminPicker() {
  const modal = document.getElementById("admin-picker-modal");
  if (modal) {
    modal.classList.add("hidden");
    modal.style.display = "";
  }
}

function renderAdminPickerList() {
  const listEl = document.getElementById("admin-picker-list");
  const searchEl = document.getElementById("admin-picker-search");
  if (!listEl || !adminNameListCache || !adminNameListCache.length) {
    if (listEl && (!adminNameListCache || !adminNameListCache.length)) {
      listEl.innerHTML = '<p class="text-sm text-slate-400 text-center py-8">載入中或尚無資料</p>';
    }
    return;
  }

  const q = (searchEl && searchEl.value ? searchEl.value : "").trim().toLowerCase();
  const names = adminNameListCache.filter(function (n) {
    const name = String((n && n.Name) || "").toLowerCase();
    const adminID = String((n && n.AdminID) || "").toLowerCase();
    return !q || name.indexOf(q) >= 0 || adminID.indexOf(q) >= 0;
  });

  const ownerVal = document.getElementById("m-owner") ? document.getElementById("m-owner").value.trim() : "";
  const taskAssigneeVal = document.getElementById("mt-assignee")
    ? document.getElementById("mt-assignee").value.trim()
    : "";
  if (adminPickerMode === "members" && !(adminPickerSelectedMembers instanceof Set)) {
    adminPickerSelectedMembers = new Set();
  }

  if (!names.length) {
    listEl.innerHTML = '<p class="text-sm text-slate-400 text-center py-8">沒有符合的姓名</p>';
    return;
  }

  if (adminPickerMode === "owner" || adminPickerMode === "taskAssignee") {
    const checkedBase = adminPickerMode === "taskAssignee" ? taskAssigneeVal : ownerVal;
    const radioName = adminPickerMode === "taskAssignee" ? "admin-picker-task-assignee" : "admin-picker-owner";
    listEl.innerHTML = names
      .map(function (admin) {
        const name = String((admin && admin.Name) || "").trim();
        const checked = name === checkedBase ? " checked" : "";
        return (
          '<label class="flex items-center gap-3 px-3 py-2.5 hover:bg-slate-50 cursor-pointer text-sm text-slate-800">' +
          '<input type="radio" name="' +
          radioName +
          '" class="shrink-0 text-blue-600" value="' +
          escAttr(name) +
          '"' +
          checked +
          ">" +
          "<span>" +
          escHtml(name) +
          "</span></label>"
        );
      })
      .join("");
  } else {
    listEl.innerHTML = names
      .map(function (admin) {
        const name = String((admin && admin.Name) || "").trim();
        const checked = adminPickerSelectedMembers.has(name) ? " checked" : "";
        return (
          '<label class="flex items-center gap-3 px-3 py-2.5 hover:bg-slate-50 cursor-pointer text-sm text-slate-800">' +
          '<input type="checkbox" class="ap-mem-cb shrink-0 text-blue-600 rounded" value="' +
          escAttr(name) +
          '"' +
          checked +
          ">" +
          "<span>" +
          escHtml(name) +
          "</span></label>"
        );
      })
      .join("");
    const boxes = listEl.querySelectorAll(".ap-mem-cb");
    boxes.forEach(function (cb) {
      cb.addEventListener("change", function () {
        const v = String(cb.value || "").trim();
        if (!v) return;
        if (cb.checked) {
          adminPickerSelectedMembers.add(v);
        } else {
          adminPickerSelectedMembers.delete(v);
        }
      });
    });
  }
}

function applyAdminPicker() {
  if (adminPickerMode === "owner") {
    const radio = document.querySelector('input[name="admin-picker-owner"]:checked');
    const el = document.getElementById("m-owner");
    if (el) el.value = radio ? radio.value : "";
  } else if (adminPickerMode === "taskAssignee") {
    const radio = document.querySelector('input[name="admin-picker-task-assignee"]:checked');
    const el = document.getElementById("mt-assignee");
    if (el) el.value = radio ? radio.value : "";
  } else {
    const vals = Array.from(adminPickerSelectedMembers);
    const el = document.getElementById("m-members");
    if (el) el.value = vals.join(",");
  }
  closeAdminPicker();
}

function toYYYYMMDD(d) {
  if (!d) return "";
  const s = String(d).trim();
  return s.includes("-") ? s.replace(/-/g, "") : s;
}

function departmentNameToCode(deptText) {
  if (!deptText) return "";
  const s = String(deptText).trim();
  return DEPARTMENT_CODE_MAP[s] || (/^\d+$/.test(s) ? s : "");
}

function statusToCode(statusText) {
  if (!statusText) return "1";
  const s = String(statusText).trim();
  // 優先用後端 TaskStateList（支援你提到的 7 種狀態）
  if (Array.isArray(taskStateListCache) && taskStateListCache.length) {
    const match = taskStateListCache.find((st) => {
      if (!st) return false;
      const name = String(st.Name || "").trim();
      const code = String(st.Code || "").trim();
      return name === s || code === s;
    });
    if (match && match.Code != null) return String(match.Code).trim();
  }
  return TASK_STATE_CODE_MAP[s] || (/^\d+$/.test(s) ? s : "1");
}

function setSelectValueIfOptionExists(selectEl, desiredValue, fallbackValue) {
  if (!selectEl) return;
  const dv = desiredValue == null ? "" : String(desiredValue);
  const exists = Array.from(selectEl.options).some((o) => String(o.value) === dv);
  if (exists) {
    selectEl.value = dv;
    return;
  }
  const fv = fallbackValue == null ? "" : String(fallbackValue);
  if (fv && Array.from(selectEl.options).some((o) => String(o.value) === fv)) {
    selectEl.value = fv;
    return;
  }
  if (selectEl.options.length) selectEl.value = selectEl.options[0].value;
}

function populateDepartmentSelect(selectEl, placeholderText) {
  if (!selectEl) return;
  const current = selectEl.value;
  selectEl.innerHTML = "";

  if (placeholderText != null) {
    const ph = document.createElement("option");
    ph.value = "";
    ph.textContent = placeholderText;
    selectEl.appendChild(ph);
  }

  const list =
    Array.isArray(departmentListCache) && departmentListCache.length
      ? departmentListCache
      : Object.keys(DEPARTMENT_CODE_MAP).map((name) => ({
          Name: name,
          Code: DEPARTMENT_CODE_MAP[name],
        }));

  list.forEach((d) => {
    const opt = document.createElement("option");
    opt.value = String(d.Name);
    opt.textContent = String(d.Name);
    selectEl.appendChild(opt);
  });

  setSelectValueIfOptionExists(
    selectEl,
    current,
    placeholderText != null ? "" : selectEl.options[0]?.value
  );
}

function populateTaskStateSelect(selectEl) {
  if (!selectEl) return;
  const current = selectEl.value;
  selectEl.innerHTML = "";

  const list =
    Array.isArray(taskStateListCache) && taskStateListCache.length
      ? taskStateListCache
      : Object.keys(TASK_STATE_CODE_MAP).map((name) => ({
          Name: name,
          Code: TASK_STATE_CODE_MAP[name],
        }));

  list.forEach((st) => {
    const opt = document.createElement("option");
    opt.value = String(st.Name);
    opt.textContent = `${statusIconByCode(st.Code)} ${String(st.Name)}`;
    selectEl.appendChild(opt);
  });

  setSelectValueIfOptionExists(selectEl, current, selectEl.options[0]?.value);
}

function collectManualKPIList() {
  const rows = document.querySelectorAll("#m-kpi-list > div");
  return Array.from(rows)
    .map((row) => {
      const inputs = row.querySelectorAll("input");
      const KPIName = inputs[0] ? inputs[0].value.trim() : "";
      const KPITarget = inputs[1] ? inputs[1].value.trim() : "";
      if (!KPIName && !KPITarget) return null;
      return { KPIName: KPIName, KPITarget: KPITarget };
    })
    .filter(Boolean);
}

function collectManualTaskList() {
  // 把前置任務的「本機 id」轉成「1-based CID」：後端 spec 範例用 CID 不能是空白
  const idToCid = {};
  manualTasks.forEach((t, idx) => {
    idToCid[t.id] = String(idx + 1);
  });

  return manualTasks.map((t) => {
    const prereqCid = t.prerequisite ? idToCid[t.prerequisite] || "0" : "0";
    return {
      Topic: t.title || "",
      Description: t.desc || "",
      StartDate: toYYYYMMDD(t.startDate || ""),
      EndDate: toYYYYMMDD(t.endDate || ""),
      ExactEndDate: toYYYYMMDD(t.exactEndDate || t.endDate || ""),
      ChargeMan: t.assignee || "",
      State: statusToCode(t.status || "待辦"),
      PreTaskID: String(prereqCid).trim() || "0",
      ExePlan: t.exePlan || "",
      ExeCond: t.exeCond || "",
      ExeResult: t.exeResult || "",
      URLList: (Array.isArray(t.discussionLinks) ? t.discussionLinks : [])
        .map((item) => String(item && item.url ? item.url : "").trim())
        .filter(Boolean),
      FileList: (Array.isArray(t.fileList) ? t.fileList : [])
        .map((f) => ({
          FileName: String((f && (f.FileName || f.fileName || f.name)) || "").trim(),
          base64String: String((f && (f.base64String || f.Base64String || f.base64)) || "").trim()
        }))
        .filter((f) => f.FileName && f.base64String),
    };
  });
}

function collectManualProjectPayload() {
  const ProjectName = document.getElementById("m-proj-name").value.trim();
  const ChargeMan = document.getElementById("m-owner").value.trim();
  const Participants = document.getElementById("m-members").value.trim();
  const StartDate = toYYYYMMDD(document.getElementById("m-start").value);
  const EndDate = toYYYYMMDD(document.getElementById("m-end").value);
  const deptText = document.getElementById("m-dept").value;
  const Department = departmentNameToCode(deptText);
  const ShareProject_URL = document.getElementById("m-url").value.trim();
  const Decision = document.getElementById("m-decision").value.trim();

  const KPIList = collectManualKPIList();
  const TaskList = collectManualTaskList();

  const missing = [];
  if (!ProjectName) missing.push("專案名稱");
  if (!ChargeMan) missing.push("負責人");
  if (!Participants) missing.push("參與人員");
  if (!StartDate) missing.push("開始日期");
  if (!EndDate) missing.push("結束日期");
  if (!Department) missing.push("部門");
  if (!Decision) missing.push("決策摘要");


  if (missing.length) {
    showToast("請補齊： " + missing.join("、"), "warn");
    return null;
  }

  if (StartDate && EndDate && EndDate < StartDate) {
    showToast("專案結束日期不可早於開始日期", "warn");
    return null;
  }

  return {
    State: "1",
    ProjectName,
    ChargeMan,
    Participants,
    StartDate,
    EndDate,
    Department,
    ShareProject_URL,
    Decision,
    KPIList,
    TaskList,
  };
}

function escapeAttr(value) {
  return String(value == null ? "" : value)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function updateManualKPI(id, field, value) {
  const item = manualKPIs.find(k => k.id === id);
  if (!item) return;
  item[field] = value;
}

function openTaskModal(id = null) {
  editingTaskId = id;

    document.getElementById('mt-assignee').value = '';

    document.getElementById('mt-exe-result').value = '';

async function saveTaskModal() {
  const title = document.getElementById('mt-title').value.trim();
  if (!title) { showToast('請填入任務標題', 'warn'); return; }
  const startDate = document.getElementById('mt-start').value;
  const endDate = document.getElementById('mt-end').value;
  if (startDate && endDate && endDate < startDate) {
    showToast('結束日期不可早於開始日期', 'warn');
    return;
  }
  const data = {
    title,
    desc: document.getElementById('mt-desc').value.trim(),
    startDate: startDate,
    endDate: endDate,
    assignee: document.getElementById('mt-assignee').value,
    status: document.getElementById('mt-status').value,
    prerequisite: document.getElementById('mt-prereq').value,
    exePlan: document.getElementById('mt-exe-plan').value.trim(),
    exeCond: document.getElementById('mt-exe-cond').value.trim(),
    exeResult: document.getElementById('mt-exe-result').value.trim(),
    discussionLinks: getTaskDiscussionRowsFromDOM(),
    fileList: manualTaskFileDraft.map((f) => ({
      FileName: String((f && f.FileName) || "").trim(),
      base64String: String((f && f.base64String) || "").trim()
    })).filter((f) => f.FileName && f.base64String),
  };
  if (editingTaskId) {
    const idx = manualTasks.findIndex(t => t.id === editingTaskId);
    manualTasks[idx] = { ...manualTasks[idx], ...data };
    showToast('任務已更新');
  } else {
    manualTasks.push({ id: Date.now(), ...data });
    showToast('已新增任務：' + title);
  }
  closeTaskModal();
  renderManualTasks();
}

function deleteTaskModal() {
  manualTasks = manualTasks.filter(t => t.id !== editingTaskId);
  closeTaskModal();
  renderManualTasks();

      <button type="button" onclick="removeTaskFileRow(${idx})" class="px-2 py-1 rounded border border-red-200 text-red-600 hover:bg-red-50 text-xs transition">刪除</button>
    </div>
  `).join('');
}

function removeTaskFileRow(idx) {
  if (!Array.isArray(manualTaskFileDraft)) return;
  manualTaskFileDraft.splice(idx, 1);
  renderTaskFileRows();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = String(reader.result || "");
      const base64 = result.includes(",") ? result.split(",")[1] : result;
      resolve(base64);
    };
    reader.onerror = () => reject(new Error("讀取檔案失敗"));
    reader.readAsDataURL(file);
  });
}

async function handleTaskFileInput(input) {
  const files = Array.from((input && input.files) || []);
  if (!files.length) return;
  for (const file of files) {
    try {
      const base64String = await fileToBase64(file);
      manualTaskFileDraft.push({
        FileName: String(file.name || "").trim(),
        base64String: String(base64String || "").trim()
      });
    } catch (err) {
      showToast(`「${file.name || "檔案"}」讀取失敗`, "warn");
    }
  }
  renderTaskFileRows();
  if (input) input.value = "";
}

// ─── MANUAL SUBMIT ───
function submitManualProject() {
  const session = getBackendTokenAndAdmin();
  if (!session) return;

  const payload = collectManualProjectPayload();
  if (!payload) return;

  showToast("建立專案中…", "success");
  postJson(NEW_PROJECT_URL, Object.assign({ AdminID: session.adminID, Token: session.token }, payload))
    .then(function (r) {
      if (r && r.Result === "OK") {
        if (r.AID != null) localStorage.setItem("projectAID", String(r.AID));
        showToast("🎉 專案建立成功！");
        setTimeout(() => { window.location.href = "/projectOS/task-tracking.html"; }, 800);
      } else {
        showToast("建立失敗：" + (r && (r.Message || r.Result) ? (r.Message || r.Result) : "未知錯誤"), "warn");
      }
    })
    .catch(function () {
      showToast("伺服器錯誤，請稍後再試", "warn");
    });
}

// ─── TOAST ───
let toastTimer;
function showToast(msg, type='success') {
  const toast=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  document.getElementById('toast-icon').className=type==='warn'?'w-4 h-4 text-amber-400 flex-shrink-0':'w-4 h-4 text-green-400 flex-shrink-0';
  toast.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.add('hidden'),3500);
}

(function initNavAvatar(){
  try {
    const el = document.getElementById('navUserAvatar');
    if (!el) return;
    const raw = localStorage.getItem('userData');
    if (raw) {
      const u = JSON.parse(raw);
      const name = (u.Member && u.Member.Name) || u.Name || '會員';
      el.textContent = String(name).trim().charAt(0).toUpperCase() || '?';
      return;
    }
    const adminName = localStorage.getItem('adminName') || sessionStorage.getItem('adminName');
    const adminId = localStorage.getItem('adminID') || sessionStorage.getItem('adminID');
    const label = (adminName || adminId || '').trim();
    if (label) el.textContent = label.charAt(0).toUpperCase() || '?';
  } catch (e) {}
})();

// ─── INIT REFERENCE DATA (Departments / Task States) ───
(function initReferenceData() {
  // 不用 await：只要更新 UI 即可
  var session = getBackendTokenAndAdmin();
  if (!session) return;

  var authBody = { AdminID: session.adminID, Token: session.token };

  // 1) 部門資訊
  postJson(GET_DEPARTMENT_URL, authBody)
    .then(function (resp) {
      if (resp && String(resp.Result).toUpperCase() === "OK" && Array.isArray(resp.DepartmentList)) {
        departmentListCache = resp.DepartmentList;
        DEPARTMENT_CODE_MAP = {};
        resp.DepartmentList.forEach(function (d) {
          if (!d) return;
          var name = String(d.Name || "").trim();
          var code = String(d.Code || "").trim();
          if (!name || !code) return;
          DEPARTMENT_CODE_MAP[name] = code;
        });

        populateDepartmentSelect(document.getElementById('m-dept'), '選擇部門');
      }
    })
    .catch(function () {
      // API 失敗時保留預設 select + map
    });

  // 2) 任務狀態列表（嘗試多個可能 endpoint）
  var tryUrls = TASK_STATE_LIST_URLS.slice();
  var tryNext = function () {
    if (!tryUrls.length) return;
    var url = tryUrls.shift();
    postJson(url, authBody)
      .then(function (resp) {
        if (!resp) return;
        if (String(resp.Result).toUpperCase() !== "OK") return;
        if (!Array.isArray(resp.TaskStateList)) return;

        taskStateListCache = resp.TaskStateList;
        TASK_STATE_CODE_MAP = {};
        resp.TaskStateList.forEach(function (st) {
          if (!st) return;
          var name = String(st.Name || "").trim();
          var code = String(st.Code || "").trim();
          if (!name || !code) return;
          TASK_STATE_CODE_MAP[name] = code;
        });

        populateTaskStateSelect(document.getElementById('mt-status'));
      })
      .catch(function () {
        tryNext();
      });
  };
  tryNext();
})();
</script>
