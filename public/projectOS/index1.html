<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProjectOS - 登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#f0f7ff",
              100: "#e0efff",
              500: "#3b82f6",
              600: "#2563eb",
              700: "#1d4ed8"
            }
          }
        }
      }
    };
  </script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");
    * { font-family: "Inter", sans-serif; }
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, .15); }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-screen-xl mx-auto px-4 flex items-center h-14 gap-3">
      <a href="dashboard.html" class="flex items-center gap-2 font-bold text-blue-600 text-lg tracking-tight hover:opacity-80">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
        </svg>
        ProjectOS
      </a>
      <span class="text-xs text-slate-300">AI Decision OS</span>
    </div>
  </nav>

  <main class="max-w-screen-xl mx-auto px-4 py-10 md:py-16">
    <div class="max-w-md mx-auto fade-in">
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-7 md:p-8">
        <div class="mb-6">
          <p class="text-xs font-semibold text-blue-600 bg-blue-50 border border-blue-200 px-2.5 py-1 rounded-full inline-flex">版本 A</p>
          <h1 class="text-2xl font-extrabold text-slate-900 mt-3">歡迎回到 ProjectOS</h1>
          <p class="text-sm text-slate-500 mt-1">登入後即可查看 Dashboard、建立專案與任務追蹤。</p>
        </div>

        <form class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1.5">公司信箱</label>
            <input type="email" placeholder="you@company.com" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:border-blue-400 transition">
          </div>
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label class="block text-xs font-medium text-slate-500">密碼</label>
              <a href="#" class="text-xs text-blue-600 hover:text-blue-700">忘記密碼</a>
            </div>
            <div class="relative">
              <input id="password1" type="password" placeholder="請輸入密碼" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 pr-11 text-sm focus:border-blue-400 transition">
              <button type="button" onclick="togglePwd('password1', this)" class="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-slate-500 hover:text-slate-700 px-2 py-1">顯示</button>
            </div>
          </div>

          <label class="flex items-center gap-2 text-sm text-slate-600">
            <input type="checkbox" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
            保持登入 7 天
          </label>

          <button type="button" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-xl font-bold text-sm transition">登入</button>
          <button type="button" class="w-full border border-slate-200 hover:bg-slate-50 text-slate-600 py-2.5 rounded-xl font-medium text-sm transition">使用 SSO 登入</button>
        </form>

        <p class="text-xs text-slate-400 text-center mt-5">
          還沒有帳號？
          <a href="#" class="text-blue-600 hover:text-blue-700 font-medium">申請開通</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      const show = input.type === "password";
      input.type = show ? "text" : "password";
      btn.textContent = show ? "隱藏" : "顯示";
    }
  </script>
</body>
</html>
